<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — TopRatedVAs.com</title>
<meta name="description" content="Log in to your TopRatedVAs account.">
<meta name="robots" content="noindex">
<link rel="icon" href="assets/img/favicon-64.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Public+Sans:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="login">

<main>
  <div class="authwrap">
    <div class="authcard">
      <h1>Welcome back</h1>
      <div class="sub">Log in to your VA or employer dashboard.</div>
      <form id="loginForm" novalidate>
        <div class="field"><label for="li-email">Email</label><input id="li-email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required></div>
        <div class="field"><label for="li-pass">Password</label><input id="li-pass" name="password" type="password" autocomplete="current-password" placeholder="Your password" required></div>
        <div class="autherr" id="authError"></div>
        <button class="btn btn-teal btn-big" type="submit" style="width:100%">Sign in</button>
      </form>
      <div class="authalt">New here? <a href="signup.html">Create an account</a></div>
    </div>
  </div>
</main>

<script type="module" src="assets/auth.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
